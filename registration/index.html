<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration Form</title>
    <link rel="stylesheet" href="style.css">
<script src="index.js" defer></script>

</head>

<body>

    <div class="container">

        <h1 class="form-title">Account Registration Form</h1>

        <form id="registration-form" class="form-container" action="#" method="post">

         

            <fieldset>
                <legend>Personal Information</legend>

                <div class="input-group">
                    <label for="first-name">First Name</label>
                    <input
                        type="text"
                        id="first-name"
                        name="firstName"
                        placeholder="Enter First Name"
                        autocomplete="given-name"
                        required>
                </div>

                <div class="input-group">
                    <label for="last-name">Last Name</label>
                    <input
                        type="text"
                        id="last-name"
                        name="lastName"
                        placeholder="Enter Last Name"
                        autocomplete="family-name"
                        required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter Email Address"
                        autocomplete="email"
                        required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="Enter Phone Number"
                        autocomplete="tel"
                        required>
                </div>

                <div class="input-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="dob">Date of Birth</label>
                    <input
                        type="date"
                        id="dob"
                        name="dob"
                        required>
                </div>

                <div class="input-group">
                    <label for="address">Residential Address</label>
                    <textarea
                        id="address"
                        name="address"
                        rows="4"
                        placeholder="Enter Full Address"
                        required></textarea>
                </div>

            </fieldset>
 
      

            <fieldset>
                <legend>Next of Kin / Emergency Contact</legend>

                <div class="input-group">
                    <label for="kin-first-name">First Name</label>
                    <input
                        type="text"
                        id="kin-first-name"
                        name="kinFirstName"
                        placeholder="First Name"
                        required>
                </div>

                <div class="input-group">
                    <label for="kin-last-name">Last Name</label>
                    <input
                        type="text"
                        id="kin-last-name"
                        name="kinLastName"
                        placeholder="Last Name"
                        required>
                </div>

                <div class="input-group">
                    <label for="relationship">Relationship</label>
                    <input
                        type="text"
                        id="relationship"
                        name="relationship"
                        placeholder="Relationship"
                        required>
                </div>

                <div class="input-group">
                    <label for="kin-phone">Phone Number</label>
                    <input
                        type="tel"
                        id="kin-phone"
                        name="kinPhone"
                        placeholder="Phone Number"
                        required>
                </div>

                <div class="input-group">
                    <label for="kin-email">Email Address</label>
                    <input
                        type="email"
                        id="kin-email"
                        name="kinEmail"
                        placeholder="Email Address">
                </div>

            </fieldset>

     

            <fieldset>
                <legend>Account Information</legend>

                <div class="input-group">
                    <label for="account-type">Account Type</label>
                    <select id="account-type" name="accountType" required>
                        <option value="">Select Account Type</option>
                        <option value="Savings">Savings</option>
                        <option value="Current">Current</option>
                        <option value="Domiciliary">Domiciliary</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="id-type">Means of Identification</label>
                    <select id="id-type" name="idType" required>
                        <option value="">Select ID Type</option>
                        <option value="National ID">National ID</option>
                        <option value="Voter's Card">Voter's Card</option>
                        <option value="Driver's License">Driver's License</option>
                        <option value="International Passport">International Passport</option>
                        <option value="NIN Slip">NIN Slip</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="id-number">Identification Number</label>
                    <input
                        type="text"
                        id="id-number"
                        name="idNumber"
                        placeholder="Enter ID Number"
                        required>
                </div>

            </fieldset>

            <fieldset>
                <legend>Security</legend>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create Password"
                        required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirmPassword"
                        placeholder="Confirm Password"
                        required>
                </div>

            </fieldset>

            <!-- Terms -->

            <div class="checkbox-group">
                <input
                    type="checkbox"
                    id="terms"
                    name="terms"
                    required>

                <label for="terms">
                    I agree to the Terms and Conditions.
                </label>
            </div>

            <!-- Buttons -->

            <div class="button-group">
                <button type="reset">Clear Form</button>
                <button type="submit">Register Account</button>
            </div>

        </form>

    </div>

</body>
</html>
